
[[battery.display]] # "bold red" style and discharging_symbol when capacity is between 0% and 10%
style = "bold red"
threshold = 30

[[battery.display]] # "bold yellow" style and 💦 symbol when capacity is between 10% and 30%
discharging_symbol = "💦"
style = "bold yellow"
threshold = 50

[[battery.display]]
style = "green"
threshold = 100

[battery]
charging_symbol = "⚡️ "
discharging_symbol = "📉 "
empty_symbol = "💀 "
full_symbol = "🔋 "

[time]
style = "cyan"
disabled = false

[status]
disabled = false
format = '✗[$symbol $common_meaning$signal_name$maybe_int]✗($style) '
map_symbol = true


[git_branch]
style = "bold cyan"

[git_status]
format = '([\[$all_status\]$ahead_behind]($style) )'
style = 'cyan'
conflicted = '$count☠️'
up_to_date = '✅'
untracked = '$count🆕'
ahead = '$count⬆︎ '
behind = '$count⬇︎ '
diverged = '$ahead_count⬆︎ $behind_count⬇︎ '
modified = '$count✏️ '
staged = '$count💾 '
renamed = '$count🔀 '
deleted = '$count🗑️ '
stashed = ''

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold yellow'

[cmd_duration]
min_time = 500
format = 'took [$duration]($style) '
style = 'bold yellow'

# Background jobs - shows count of background jobs
[jobs]
format = '[$symbol$number]($style) '
symbol = '✦ '
style = 'bold blue'
number_threshold = 1



[aws]
disabled = true

[package]
disabled = true

[nodejs]
format = 'with [$symbol(Node$version)]($style) '
symbol = '🟢'
style = 'green'
detect_files = ['package.json', '.node-version']
detect_folders = ['node_modules']


[docker_context]
format = 'with [$symbol($context)]($style) '
symbol = '🐳'
style = 'blue'
only_with_files = true
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_folders = []

[rust]
format = 'with [$symbol($version)]($style) '
symbol = '🦀'
style = 'red'
detect_files = ['Cargo.toml', 'Cargo.lock']
detect_folders = []

# Python - shows python version in python projects
[python]
format = 'with [$symbol(${pyenv_prefix}${version}${virtualenv})]($style) '
symbol = '🐍'
style = 'yellow'
pyenv_version_name = false
detect_files = ['.python-version', 'Pipfile', '__pycache__', 'pyproject.toml', 'requirements.txt', 'setup.py', 'tox.ini', '.venv']
detect_folders = []

# Go - shows go version in go projects
[golang]
format = 'with [$symbol(Go $version)]($style) '
symbol = '🐹'
style = 'cyan'
detect_files = ['go.mod', 'go.sum', 'go.work']
detect_folders = []

# Kubernetes - shows kubectl context
[kubernetes]
format = 'with [$symbol(K8s $context $namespace)]($style) '
symbol = '⛵'
style = 'green'
detect_files = []
detect_folders = ['.kube']
detect_extensions = []

# Shell - shows current shell
[shell]
format = '[$indicator]($style) '
bash_indicator = 'bsh'
fish_indicator = 'fsh'
zsh_indicator = 'zsh'
style = 'white bold dimmed'
disabled = true

